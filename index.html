<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Custos - Germani Alimentos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #003366; --secondary: #f0f2f5; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--secondary); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ccc; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: none; font-weight: bold; font-size: 16px; }
        .tab-btn.active { border-bottom: 3px solid var(--primary); color: var(--primary); }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: var(--primary); color: white; cursor: pointer; border: none; transition: 0.3s; font-weight: bold; }
        button:hover { background: #002244; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }
        th { background-color: var(--primary); color: white; }
        .up { color: var(--danger); font-weight: bold; }
        .down { color: var(--success); font-weight: bold; }
        #chartContainer { height: 300px; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showTab('import')">📥 Importar Dados</button>
        <button class="tab-btn" onclick="showTab('report')">📊 Relatórios e Gráficos</button>
    </div>

    <div id="tab-import" class="tab-content">
        <div class="card">
            <h2>Enviar Nova Planilha Semanal</h2>
            <div class="grid">
                <div>
                    <label>Data de Referência:</label>
                    <input type="date" id="importDate">
                </div>
                <div>
                    <label>Selecione o Arquivo (.xlsx):</label>
                    <input type="file" id="fileInput" accept=".xlsx">
                </div>
            </div>
            <button onclick="uploadData()" style="margin-top: 20px;">Processar e Salvar no Banco</button>
            <div id="importStatus" style="margin-top: 15px; text-align: center;"></div>
        </div>
    </div>

    <div id="tab-report" class="tab-content hidden">
        <div class="card">
            <h2>Comparativo de Custos</h2>
            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <div>
                    <label>Semana Base (Antiga):</label>
                    <input type="date" id="dateA">
                </div>
                <div>
                    <label>Semana Nova (Atual):</label>
                    <input type="date" id="dateB">
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button onclick="compareCosts()">Comparar Custos</button>
                </div>
            </div>
        </div>

        <div id="resultArea" class="hidden">
            <div class="card">
                <h3>Variação por Produto</h3>
                <div id="chartContainer">
                    <canvas id="costChart"></canvas>
                </div>
                <div id="tableContainer"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://umpebdovrazzrdndhigc.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtcGViZG92cmF6enJkbmRoaWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODMyMjgsImV4cCI6MjA4OTg1OTIyOH0.ecAVT1-bLv3yZOp-GnyR88lpH0xSVXV2hM80rB0fm6M';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let myChart = null;

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.remove('hidden');
        event.target.classList.add('active');
    }

    async function uploadData() {
        const file = document.getElementById('fileInput').files[0];
        const date = document.getElementById('importDate').value;
        const status = document.getElementById('importStatus');
        if(!file || !date) return alert("Preencha data e arquivo!");

        status.innerHTML = "Limpando e enviando...";
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet);

            const toInsert = rows.map(r => ({
                codigo_produto: String(r['Produto'] || ''),
                descricao: r['Descrição'] || '',
                custo_total: parseFloat(r['Custo Total'] || 0),
                data_referencia: date
            })).filter(i => i.codigo_produto);

            const { error } = await client.from('historico_custos').insert(toInsert);
            status.innerHTML = error ? "Erro: " + error.message : "✅ " + toInsert.length + " itens salvos!";
        };
        reader.readAsArrayBuffer(file);
    }

    async function compareCosts() {
        const dateA = document.getElementById('dateA').value;
        const dateB = document.getElementById('dateB').value;
        if(!dateA || !dateB) return alert("Selecione as duas datas!");

        const { data: costs } = await client.from('historico_custos')
            .select('*')
            .in('data_referencia', [dateA, dateB]);

        processComparison(costs, dateA, dateB);
    }

    function processComparison(data, dateA, dateB) {
        const produtos = {};
        data.forEach(item => {
            if(!produtos[item.codigo_produto]) {
                produtos[item.codigo_produto] = { desc: item.descricao, valA: 0, valB: 0 };
            }
            if(item.data_referencia === dateA) produtos[item.codigo_produto].valA = item.custo_total;
            if(item.data_referencia === dateB) produtos[item.codigo_produto].valB = item.custo_total;
        });

        let html = `<table><tr><th>Cód</th><th>Descrição</th><th>${dateA}</th><th>${dateB}</th><th>Var %</th></tr>`;
        const labels = [];
        const diffs = [];

        Object.keys(produtos).forEach(cod => {
            const p = produtos[cod];
            const varPerc = p.valA > 0 ? ((p.valB - p.valA) / p.valA * 100).toFixed(2) : 0;
            const classe = varPerc > 0 ? 'up' : (varPerc < 0 ? 'down' : '');
            
            html += `<tr><td>${cod}</td><td>${p.desc}</td><td>R$ ${p.valA}</td><td>R$ ${p.valB}</td><td class="${classe}">${varPerc}%</td></tr>`;
            
            if(Math.abs(varPerc) > 0) {
                labels.push(p.desc.substring(0,15));
                diffs.push(varPerc);
            }
        });

        document.getElementById('tableContainer').innerHTML = html + "</table>";
        document.getElementById('resultArea').classList.remove('hidden');
        renderChart(labels, diffs);
    }

    function renderChart(labels, values) {
        if(myChart) myChart.destroy();
        const ctx = document.getElementById('costChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Variação % de Custo',
                    data: values,
                    backgroundColor: values.map(v => v > 0 ? '#dc3545' : '#28a745')
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
